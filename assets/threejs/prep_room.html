<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── IFRAME DETECTION ───────────────────────────────────────────────────────
if(window.self!==window.top){
  document.addEventListener('DOMContentLoaded',()=>{
    const nav=document.getElementById('main-nav');
    if(nav)nav.style.display='none';
    ['layout-3col','layout-full'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.style.height='100vh';el.style.marginTop='0';}
    });
    // Force renderer resize after layout settles
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      if(typeof renderer!=='undefined'&&renderer){
        const c=document.getElementById('cc');
        const w=c?c.clientWidth:window.innerWidth-480;
        const h=c?c.clientHeight:window.innerHeight;
        if(w>10&&h>10){
          camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
        }
      }
    }));
  });
}

// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const TABS=['Final Playing XI','Bowling Attack','Opposition Batting','Batting Scenarios'];

const TEAM_DATA={
  'Quetta Gladiators':{abbr:'QG',color:'#8B5CF6',bg:'linear-gradient(135deg,#23074F,#8B5CF6)'},
  'Lahore Qalandars':{abbr:'LQ',color:'#00C853',bg:'linear-gradient(135deg,#003300,#00C853)'},
  'Islamabad United':{abbr:'IU',color:'#F44336',bg:'linear-gradient(135deg,#4a0000,#F44336)'},
  'Karachi Kings':{abbr:'KK',color:'#00E5FF',bg:'linear-gradient(135deg,#003344,#00E5FF)'},
  'Peshawar Zalmi':{abbr:'PZ',color:'#FF8C00',bg:'linear-gradient(135deg,#3a1a00,#FF8C00)'},
  'Multan Sultans':{abbr:'MS',color:'#FFD700',bg:'linear-gradient(135deg,#2a1a00,#FFD700)'},
  'Rawalpindiz':{abbr:'RW',color:'#1565C0',bg:'linear-gradient(135deg,#001a4a,#1565C0)'},
  'Hyderabad Kingsmen':{abbr:'HK',color:'#F57F17',bg:'linear-gradient(135deg,#3a1a00,#F57F17)'},
};

const playerPos=[
  {x:0,z:-15},{x:-10,z:-12},{x:10,z:-12},{x:-16,z:-5},{x:16,z:-5},
  {x:-17,z:4},{x:17,z:4},{x:-10,z:12},{x:10,z:12},{x:0,z:16},{x:0,z:0},
];

// ─── MUTABLE STATE ──────────────────────────────────────────────────────────
let metaData={teams:[],venues:[],squad_by_team:{}};
let briefData=null;
let briefGenerated=false;
let curTab=0,curXI=0,curOver=1,curBriefFormation=0;
let curTeam='',curOppTeam='',curVenue='';

let fullSquad=[],selectedSquad=new Set();
let xiOpts=[],overPlan=[],bowlerAlloc=[],oppBat=[];
let matchupNotes=[],contingency=[],scenarios=[],formations=[];
let tossRec={decision:'—',reason:'Generate a brief to see the toss recommendation.'};
let keyDecisions=[];

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getTeamData(name){
  return TEAM_DATA[name]||{
    abbr:(name||'??').split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase(),
    color:'#FFD700',bg:'linear-gradient(135deg,#23074F,#8B5CF6)'
  };
}
function dangerCls(d){
  const l=(d||'').toLowerCase();
  return l==='high'?'high':(l==='medium'||l==='med')?'med':'low';
}
function roleCls(r){
  const l=(r||'').toLowerCase();
  return l.includes('aggr')?'agg':l.includes('anch')?'anc':l.includes('fin')?'fin':'sup';
}
function normPhase(p){
  const l=(p||'').toLowerCase();
  return(l.includes('power')||l==='pp')?'pp':l.includes('death')?'death':'mid';
}
function mapRoleClass(r){
  const u=(r||'').toUpperCase();
  if(u.includes('WK')||u.includes('KEEPER'))return 'wk';
  if(u.includes('ALL')||u==='AR')return 'all';
  if(u.includes('BOWL')||u==='BWL')return 'bowl';
  return 'bat';
}
function mapRoleLabel(r){return{bat:'BAT',bowl:'BOWL',all:'ALL',wk:'WK'}[mapRoleClass(r)]||'BAT';}
function playerAvatar(name,color,photo){
  const ini=(name||'??').split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
  const src=photo?(photo.startsWith('assets/')?'/'+photo:photo):'';
  const imgHtml=src?`<img src="${src}" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:4px" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' ;
  return `<div style="width:44px;height:58px;border-radius:5px;background:${color||'#23074F'};border:1.5px solid rgba(255,215,0,0.4);font-family:Orbitron;font-size:12px;font-weight:900;color:#FFD700;box-shadow:0 4px 14px rgba(0,0,0,0.6);flex-shrink:0;position:relative;overflow:hidden">${imgHtml}<span style="position:absolute;top:0;left:0;width:100%;height:100%;display:${src?'none':'flex'};align-items:center;justify-content:center">${ini}</span></div>`;
}
function getPitchData(venue,opp){
  const seed=((venue||'')+(opp||'')).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng=n=>((seed*9301+49297*n)%233280)/233280;
  return{fullToss:Math.round(rng(1)*8+1),yorker:Math.round(rng(2)*12+3),
    goodLen:Math.round(rng(3)*22+8),shortOfGood:Math.round(rng(4)*18+5),
    short:Math.round(rng(5)*10+1),wideOut:Math.round(rng(6)*14+2),wideIn:Math.round(rng(7)*10+1)};
}

// ─── API: LOAD META ──────────────────────────────────────────────────────────
async function loadMeta(){
  try{
    const r=await fetch('/api/prep-meta');
    metaData=await r.json();
    if(metaData.teams?.length){
      curTeam=metaData.teams[0];
      curOppTeam=metaData.teams.length>1?metaData.teams[1]:metaData.teams[0];
    }
    if(metaData.venues?.length)curVenue=metaData.venues[0];
    const sq=metaData.squad_by_team?.[curTeam]||[];
    fullSquad=sq;selectedSquad=new Set(sq.map((_,i)=>i));
    const tb=document.getElementById('team-badge');
    if(tb)tb.textContent=getTeamData(curTeam).abbr;
    renderSidebar();
  }catch(e){console.warn('Meta load failed:',e);}
}

// ─── API: MAP BRIEF DATA ─────────────────────────────────────────────────────
function mapBriefData(brief){
  briefData=brief;
  // Toss: API uses .recommendation and .reasoning
  if(brief.toss){
    tossRec={
      decision:brief.toss.recommendation||brief.toss.decision||'—',
      reason:brief.toss.reasoning||brief.toss.reason||''
    };
  }
  keyDecisions=brief.key_decisions||[];
  contingency=brief.contingencies||[];

  // XI options → xiOpts + formations
  const optColors=['#FFD700','#8B5CF6','#F44336','#00E5FF'];
  const _tw=curTeam.split(' ');
  const _tf=(_tw.length>=2?_tw[0]+'-'+_tw[1].toLowerCase():curTeam.toLowerCase().replace(/ /g,'-'));
  xiOpts=(brief.xi_options||[]).map((opt,i)=>({
    name:opt.label||`Option ${i+1}`,
    color:optColors[i%4]||'#FFD700',
    players:(opt.players||[]).slice(0,11).map(p=>{
      const nm=p.name||'';
      return {n:nm,role:p.pos||p.role||'BAT',p:`assets/players/${_tf}/${nm.toLowerCase().replace(/ /g,'-')}.png`};
    })
  }));
  if(!xiOpts.length)xiOpts=[{name:'Playing XI',color:'#FFD700',players:[]}];

  formations=(brief.xi_options||[]).map((opt,i)=>({
    idx:i,name:opt.label||`Option ${i+1}`,color:optColors[i%4]||'#FFD700',
    players:(opt.players||[]).slice(0,11).map(p=>({n:p.name||'',role:mapRoleClass(p.pos||p.role||'BAT')}))
  }));
  if(!formations.length)formations=[{idx:0,name:'Playing XI',color:'#FFD700',players:[]}];
  curBriefFormation=0;curXI=0;

  // Over plan
  overPlan=(brief.over_plan||[]).map(o=>({
    over:o.over,bowler:o.bowler||'—',backup:o.backup||'',
    phase:normPhase(o.phase),note:o.note||''
  }));

  // Bowler allocation (computed from overPlan)
  const bMap={};
  overPlan.forEach(o=>{
    if(!bMap[o.bowler])bMap[o.bowler]={name:o.bowler,overs:[],total:0};
    bMap[o.bowler].overs.push(o.over);bMap[o.bowler].total++;
  });
  bowlerAlloc=Object.values(bMap);

  // Opposition: API field 'danger' = danger_rating string
  oppBat=(brief.opposition||[]).map(b=>({
    name:b.name||b.player_name||'Unknown',
    danger:dangerCls(b.danger||b.danger_rating||'Low'),
    form:b.form||'—',
    arrival:b.arrival||b.arrival_over_range||'—',
    notes:b.note||b.notes||b.key_note||'',
    careerSR:b.career_sr||0,deathSR:b.death_sr||0
  }));

  // Matchup notes: conf already lowercase from serializer ('high','medium','low')
  matchupNotes=(brief.matchup_notes||[]).map(m=>({
    conf:dangerCls(m.conf||m.confidence||'medium'),
    balls:m.balls||0,
    text:m.note||m.text||''
  }));

  // Scenarios: role = role_in_card (Aggressor/Anchor/Finisher/Stabiliser)
  const scCls=['a','b','c','d'];
  const scColors=['#4CAF50','#FFC107','#F44336','#00E5FF'];
  scenarios=(brief.scenarios||[]).map((s,i)=>({
    id:s.id||String.fromCharCode(65+i),
    title:s.title||`Scenario ${i+1}`,
    color:s.color||scColors[i%4]||'#4CAF50',
    cls:scCls[i%4]||'a',
    desc:s.desc||s.description||'',
    trigger:s.trigger||'',
    players:(s.players||[]).map(p=>({
      name:p.name||'',role:p.role||'Support',
      cls:roleCls(p.role||'Support'),note:p.note||p.instruction||''
    }))
  }));
}

// ─── API: GENERATE BRIEF ────────────────────────────────────────────────────
async function generateBrief(){
  const ourTeam=document.getElementById('sel-our')?.value||curTeam||metaData.teams?.[0]||'';
  const opp=document.getElementById('sel-opp')?.value||curOppTeam||metaData.teams?.[1]||'';
  const ven=document.getElementById('sel-ven')?.value||curVenue||metaData.venues?.[0]||'';
  const dt=document.getElementById('sel-dt')?.value||'';
  const squad=fullSquad.filter((_,i)=>selectedSquad.has(i));
  curTeam=ourTeam;curOppTeam=opp;curVenue=ven;

  const ourData=getTeamData(ourTeam),oppData=getTeamData(opp);
  const lsOur=document.getElementById('ls-our');
  const lsOpp=document.getElementById('ls-opp');
  if(lsOur){lsOur.textContent=ourData.abbr;lsOur.style.background=ourData.bg;lsOur.style.borderColor=ourData.color+'55';}
  if(lsOpp){lsOpp.textContent=oppData.abbr;lsOpp.style.background=oppData.bg;lsOpp.style.borderColor=oppData.color+'55';}
  const lsSub=document.getElementById('ls-sub');
  if(lsSub)lsSub.textContent=`${ourData.abbr} vs ${oppData.abbr} — Match Brief`;

  const ls=document.getElementById('loading-screen');
  const fill=document.getElementById('ls-fill');
  if(ls)ls.style.display='flex';
  if(fill){fill.style.animation='none';fill.offsetHeight;fill.style.animation='lsfill 2.5s ease-in-out forwards';}

  try{
    const resp=await fetch('/api/prep-brief',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({our_team:ourTeam,opposition:opp,venue:ven,squad,match_datetime:dt})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error||`HTTP ${resp.status}`);}
    const brief=await resp.json();
    mapBriefData(brief);
    briefGenerated=true;
    const ld=document.getElementById('live-dot');
    const ll=document.getElementById('live-label');
    if(ld){ld.style.background='#4CAF50';ld.style.animation='blink 1.5s infinite';}
    if(ll){ll.textContent='BRIEF READY';ll.style.color='#4CAF50';}
    const tb=document.getElementById('team-badge');
    if(tb){tb.textContent=ourData.abbr;tb.style.background=ourData.bg;}
  }catch(e){
    console.error('Brief failed:',e);
    briefGenerated=true; // still switch to brief view
    tossRec={decision:'ERROR',reason:'Brief generation failed: '+e.message};
  }finally{
    if(ls)ls.style.display='none';
    renderSidebar();renderRight();renderOverlays();switchTab(0);
  }
}

function switchTab(idx){
  curTab=idx;renderTabs();
  const is3=idx<3;
  document.getElementById('layout-3col').classList.toggle('hidden',!is3);
  document.getElementById('layout-full').classList.toggle('hidden',is3);
  const zc=document.getElementById('zoom-ctrl'),zh=document.getElementById('zoom-hint');
  if(zc)zc.style.display=(idx===1)?'flex':'none';
  if(zh)zh.style.display=(idx===1)?'block':'none';

  else renderScenarios();
}

// ─── PITCH HEATMAP ───────────────────────────────────────────────────────────
function buildPitchHeatmapHTML(venue,opp){
  const data=getPitchData(venue||curVenue,opp||curOppTeam);
  const zones=[
    {label:'FULL TOSS',key:'fullToss',color:'#4CAF50'},{label:'YORKER',key:'yorker',color:'#8BC34A'},
    {label:'GOOD LEN',key:'goodLen',color:'#F44336'},{label:'SHORT/GD',key:'shortOfGood',color:'#FF5722'},
    {label:'SHORT',key:'short',color:'#FF9800'},
  ];
  const maxCount=Math.max(...zones.map(z=>data[z.key]),1);
  const zonesHTML=zones.map(z=>{
    const cnt=data[z.key],intensity=cnt/maxCount;
    let bg=intensity<0.35?'rgba(76,175,80,':intensity<0.65?'rgba(255,152,0,':intensity<0.85?'rgba(255,87,34,':'rgba(244,67,54,';
    const alpha=(0.25+intensity*0.65).toFixed(2);
    const dots=Array.from({length:Math.min(cnt,10)},()=>`<div class="phm-dot"></div>`).join('');
    return`<div class="phm-zone" style="background:${bg}${alpha});flex:${0.8+intensity*1.2}"><div><div class="phm-zone-label">${z.label}</div><div class="phm-dots">${dots}</div></div><div class="phm-zone-count">${cnt}W</div></div>`;
  }).join('');
  const ph=200,pw=60;const total=zones.reduce((a,z)=>a+data[z.key],0)||1;

// ─── 120-BALL BOUNDARY PROBABILITY ──────────────────────────────────────────
function genBallProbs(){
  const probs=[];
  for(let b=0;b<120;b++){
    const ov=Math.floor(b/6);let base,noise;
    if(ov<6){if(ov===0)base=0.45+Math.sin(b*0.9)*0.12;else if(ov<3)base=0.35+Math.sin(b*0.7+1)*0.1;else base=0.28+Math.sin(b*0.6)*0.09;noise=0.06;}
    else if(ov<10){base=0.18+Math.sin(b*0.4+2)*0.07;noise=0.05;}
    else if(ov<14){const prog=(ov-10)/4;base=0.20+prog*0.14+Math.sin(b*0.5)*0.06;noise=0.06;}
    else if(ov===14||ov===15){base=0.38+Math.sin(b*0.8)*0.08;noise=0.07;}
    else{const prog=(ov-15)/5;base=0.52+prog*0.28+Math.sin(b*1.2)*0.1;if(ov>=18)base=Math.min(0.92,base+0.12);noise=0.08;}
    probs.push(Math.max(0.05,Math.min(0.97,base+(Math.random()*2-1)*noise)));
  }
  return probs;
}

// ─── ANIMATION ───────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;
  camera.position.y+=(targetY-camera.position.y)*0.03;
  camera.position.x=Math.sin(t*0.06)*orbitRadius;
  camera.position.z=Math.cos(t*0.06)*orbitRadius;
  camera.lookAt(0,0,0);
  gR.material.opacity=.06+Math.sin(t)*.03;
  windDots.forEach(d=>{
    const travel=((t*d.speed+d.phase)%d.drift)/d.drift;
    d.mesh.position.x=d.baseX+travel*d.drift*windDir.x;
    d.mesh.position.z=d.baseZ+travel*d.drift*windDir.z;
    d.mesh.position.y=d.baseY+Math.sin(t*0.8+d.phase)*0.3;
    const fade=travel<0.1?travel/0.1:travel>0.85?(1-travel)/0.15:1;
    d.mesh.material.opacity=(0.06+Math.sin(t*2+d.phase)*0.04)*fade;
  });
  windStreams.forEach(s=>{s.line.position.y=Math.sin(t*0.4+s.phase)*0.3;s.cone.position.y=s.pts[s.pts.length-1].y+Math.sin(t*0.4+s.phase)*0.3;});
  if(curTab===1){
    bars.forEach(b=>{
      const ballOver=Math.floor(b.ball/6)+1;
      const isSelected=(ballOver===curOver);
      const breath=isSelected?1+Math.sin(t*2.5+b.angle)*0.25:1+Math.sin(t*1.2+b.angle*2)*0.06;
      b.mesh.scale.y=breath;
    });
  }
  renderer.render(scene,camera);updatePL();
}
