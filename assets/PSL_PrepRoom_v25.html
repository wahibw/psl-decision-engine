<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSL Prep Room — TALAASH Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Exo 2',sans-serif;background:#E8EAF2;color:#1a0a3a}
/* Soft ambient colour blobs behind everything — give depth to the white base */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 10% 5%,  rgba(139,92,246,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 45% at 88% 92%,  rgba(255,140,0,0.12)  0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%,  rgba(200,210,255,0.35) 0%,transparent 70%),
    radial-gradient(ellipse 40% 35% at 80% 10%,  rgba(0,229,255,0.08)  0%,transparent 50%),
    radial-gradient(ellipse 35% 30% at 20% 90%,  rgba(76,175,80,0.08)  0%,transparent 50%);
}

.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.7);
  box-shadow:0 1px 0 rgba(139,92,246,0.08),0 4px 20px rgba(139,92,246,0.06);
}
.nav-brand{display:flex;align-items:center;gap:0}
.nav-brand-txt{
  font-family:Rajdhani;font-size:10px;font-weight:500;
  letter-spacing:5px;text-transform:uppercase;
  color:rgba(26,10,58,0.35);
}
.nav-links{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:0;
}
.nl-sep{width:1px;height:18px;background:rgba(26,10,58,0.12);margin:0 2px}
.nl{
  font-family:Orbitron;font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(26,10,58,0.38);
  padding:6px 20px;cursor:pointer;
  transition:color .2s;
  border:none;background:transparent;
  position:relative;
}
.nl:hover{color:rgba(26,10,58,0.75)}
.nl.active{color:#6D28D9}
.nl.active::after{
  content:'';
  position:absolute;bottom:-1px;left:20px;right:20px;
  height:2px;
  background:linear-gradient(90deg,transparent,#8B5CF6,transparent);
  border-radius:2px;
}
.nav-right{display:flex;align-items:center;gap:10px}
.live-d{width:7px;height:7px;border-radius:50%;background:#16A34A;animation:blink 1.5s infinite;flex-shrink:0}
.live-l{
  font-family:Rajdhani;font-size:9px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:#16A34A;
}
.team-b{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#6D28D9,#8B5CF6);
  border:2px solid rgba(139,92,246,0.4);
  display:flex;align-items:center;justify-content:center;
  font-family:Orbitron;font-size:9px;font-weight:900;
  color:#1a0a3a;letter-spacing:0.5px;
  box-shadow:0 2px 12px rgba(139,92,246,0.35);
}
.psl-b{display:none}
.nav-t{display:none}

.main-3col{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1}
.main-full{display:grid;grid-template-columns:1fr;height:calc(100vh - 52px);margin-top:52px;position:relative;z-index:1;overflow-y:auto;padding:16px 24px}
.hidden{display:none!important}

/* Full-screen stadium canvas */
.center{position:absolute;inset:0;overflow:hidden;background:transparent}
#cc{position:absolute;inset:0;z-index:1;overflow:hidden}
#cc canvas{display:block;position:absolute;top:0;left:0;width:100%!important;height:100%!important}

/* LEFT floating glass panel */
.side{
  position:fixed;top:62px;left:14px;width:228px;
  max-height:calc(100vh - 76px);z-index:50;
  background:rgba(255,255,255,0.52);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.75);
  border-radius:16px;
  box-shadow:0 8px 32px rgba(26,10,58,0.10);
  padding:12px 10px;display:flex;flex-direction:column;overflow-y:auto;
}
.side::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(109,40,217,0.4),transparent);border-radius:16px 16px 0 0;pointer-events:none}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:rgba(109,40,217,0.2);border-radius:2px}

/* RIGHT floating glass panel — transparent wrapper, each .rc is its own card */
.rp{
  position:fixed;top:62px;right:14px;width:262px;
  max-height:calc(100vh - 76px);z-index:50;
  background:transparent;border:none;box-shadow:none;
  padding:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
}
.rp::-webkit-scrollbar{width:3px}.rp::-webkit-scrollbar-thumb{background:rgba(109,40,217,0.2);border-radius:2px}
.rp .rc{
  background:rgba(255,255,255,0.52);
  backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  border:1px solid rgba(255,255,255,0.75);
  border-radius:14px;
  box-shadow:0 6px 24px rgba(26,10,58,0.09);
  padding:12px 13px;position:relative;overflow:hidden;
}
.rp .rc::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(109,40,217,0.35),transparent);border-radius:14px 14px 0 0}

/* Overlay cards — nudge inward from floating panels */
.tabs{top:10px}
.vbar{top:48px;left:50%;transform:translateX(-50%)}
.zoom-ctrl{top:10px;right:290px}
.toss-card{bottom:16px;left:266px;max-width:220px}
.cont-card{bottom:50px;left:256px;right:276px;transform:none;max-width:none;width:auto}
.alert-card{top:60px;right:290px;max-width:240px}
.matchup-overlay{bottom:16px;left:256px;right:290px}
.st{font-family:Orbitron;font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(26,10,58,0.4);margin-bottom:10px}
.sl{font-family:Rajdhani;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(26,10,58,0.35);margin-bottom:3px;display:block}
.ss{width:100%;background:rgba(255,255,255,0.6);border:1px solid rgba(139,92,246,0.18);border-radius:7px;padding:6px 9px;color:#1a0a3a;font-family:'Exo 2';font-size:10px;outline:none;appearance:none;cursor:pointer;margin-bottom:8px}
.sp{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0 10px}
.spl{font-family:Rajdhani;font-size:9px;font-weight:600;padding:3px 8px;border-radius:12px;border:1px solid rgba(139,92,246,0.15);background:rgba(255,255,255,0.4);color:rgba(26,10,58,0.45);cursor:pointer;transition:all .2s;user-select:none}
.spl:hover{border-color:rgba(109,40,217,0.35);color:#6D28D9}
.spl.on{background:rgba(109,40,217,0.1);border-color:rgba(109,40,217,0.35);color:#6D28D9}
.sbtn{font-family:Rajdhani;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;width:100%;margin-top:6px}
.sbtn.gold{background:linear-gradient(135deg,#FF8C00,#FFD700);color:#1a0a3a;box-shadow:0 3px 12px rgba(255,140,0,0.25)}
.sbtn.ghost{background:rgba(255,255,255,0.45);color:rgba(26,10,58,0.45);border:1px solid rgba(139,92,246,0.18);margin-top:4px}

.opi{padding:7px 8px;border-radius:7px;background:rgba(255,255,255,0.35);border:1px solid rgba(139,92,246,0.1);margin-bottom:4px;cursor:pointer}
.opi.act{border-color:rgba(109,40,217,0.35);background:rgba(109,40,217,0.06)}
.opi-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.opi-o{font-family:Orbitron;font-size:8px;font-weight:700;color:#6D28D9}
.opi-ph{font-family:Rajdhani;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding:1px 5px;border-radius:3px}
.opi-ph.pp{background:rgba(0,180,220,0.12);color:#0284C7}
.opi-ph.mid{background:rgba(180,130,0,0.12);color:#B45309}
.opi-ph.death{background:rgba(220,38,38,0.1);color:#DC2626}
.opi-b{font-family:Rajdhani;font-size:10px;font-weight:600;color:rgba(26,10,58,0.65)}
.opi-n{font-family:'Exo 2';font-size:8px;color:rgba(26,10,58,0.38);margin-top:2px;font-style:italic}

.bat-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;border:1px solid rgba(139,92,246,0.1);background:rgba(255,255,255,0.3);margin-bottom:4px;cursor:pointer}
.bat-item:hover{border-color:rgba(109,40,217,0.25);background:rgba(255,255,255,0.5)}
.bat-num{font-family:Orbitron;font-size:9px;font-weight:700;color:rgba(26,10,58,0.3);width:16px}
.bat-name{font-family:Rajdhani;font-size:11px;font-weight:600;color:rgba(26,10,58,0.7)}
.bat-danger{font-family:Orbitron;font-size:6px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:3px;margin-left:auto}
.bat-danger.high{background:rgba(220,38,38,0.1);color:#DC2626}
.bat-danger.med{background:rgba(180,100,0,0.1);color:#B45309}
.bat-danger.low{background:rgba(22,163,74,0.1);color:#16A34A}

/* CENTER — see layout block above */

/* Tab bar */
.tabs{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab-row{display:flex;gap:2px;background:rgba(255,255,255,0.55);backdrop-filter:blur(20px) saturate(200%);-webkit-backdrop-filter:blur(20px) saturate(200%);padding:3px;border-radius:18px;border:1px solid rgba(255,255,255,0.75);box-shadow:0 4px 16px rgba(139,92,246,0.1)}
.tbtn{font-family:Rajdhani;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:14px;border:none;background:transparent;color:rgba(26,10,58,0.4);cursor:pointer;transition:all .2s;white-space:nowrap}
.tbtn:hover{color:rgba(26,10,58,0.7)}
.tbtn.active{background:rgba(109,40,217,0.12);color:#6D28D9;border:1px solid rgba(109,40,217,0.3)}
.xi-dot-row{display:flex;gap:8px;align-items:center}
.xi-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative}
.xi-dot:hover{transform:scale(1.3)}
.xi-dot.act{border-color:rgba(26,10,58,0.5);transform:scale(1.4)}
.xi-dot .tip{display:none;position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:Rajdhani;font-size:7px;color:#1a0a3a;background:rgba(255,255,255,0.9);padding:2px 6px;border-radius:3px;white-space:nowrap;border:1px solid rgba(139,92,246,0.2)}
.xi-dot:hover .tip{display:block}

/* View bar */
.vbar{position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:19;display:flex;gap:3px}
.vb{font-family:Rajdhani;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.5);color:rgba(26,10,58,0.45);cursor:pointer;backdrop-filter:blur(12px)}
.vb:hover{border-color:rgba(109,40,217,0.3);color:#6D28D9}
.vb.act{background:rgba(109,40,217,0.1);color:#6D28D9;border-color:rgba(109,40,217,0.35)}

/* Toss — frost glass card like Players page player info */
.toss-card{position:absolute;bottom:12px;left:12px;z-index:18;padding:14px 16px;max-width:210px;
  background:rgba(255,255,255,0.55);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,0.75);border-radius:14px;box-shadow:0 8px 32px rgba(109,40,217,0.1)}
.toss-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(109,40,217,0.5),transparent);opacity:.8;border-radius:14px 14px 0 0}
.toss-t{font-family:Orbitron;font-size:8px;font-weight:700;letter-spacing:2px;color:#6D28D9;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.toss-t .d{width:4px;height:4px;border-radius:50%;background:#6D28D9}
.toss-rec{font-family:Orbitron;font-size:16px;font-weight:900;color:#16A34A;margin-bottom:4px}
.toss-why{font-family:'Exo 2';font-size:9px;color:rgba(26,10,58,0.5);line-height:1.5}

/* Contingency + Alert */
.cont-card{position:absolute;bottom:50px;left:256px;right:276px;z-index:18;padding:10px 14px;
  background:rgba(255,255,255,0.55);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,0.75);border-radius:12px;box-shadow:0 6px 24px rgba(109,40,217,0.08)}
.cont-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(109,40,217,0.4),transparent);opacity:.7}
.cont-t{font-family:Orbitron;font-size:7px;font-weight:700;letter-spacing:2px;color:#6D28D9;margin-bottom:6px}
.cont-item{display:flex;gap:8px;margin-bottom:4px;align-items:flex-start}
.cont-text{font-family:'Exo 2';font-size:9px;color:rgba(26,10,58,0.55);line-height:1.4}

.alert-card{position:absolute;top:48px;right:10px;z-index:19;padding:8px 12px;max-width:240px;
  background:rgba(255,240,240,0.65);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(220,38,38,0.2);border-radius:10px;box-shadow:0 4px 16px rgba(220,38,38,0.08)}
.alert-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:1.5px;background:linear-gradient(90deg,transparent,#DC2626,transparent);opacity:.5;border-radius:10px 10px 0 0}
.alert-t{font-family:Orbitron;font-size:7px;font-weight:700;letter-spacing:1.5px;color:#DC2626;margin-bottom:4px}
.alert-txt{font-family:'Exo 2';font-size:9px;color:rgba(153,27,27,0.75);line-height:1.4}

/* Matchup bar */
.matchup-overlay{position:absolute;bottom:12px;left:12px;right:12px;z-index:18;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.matchup-overlay::-webkit-scrollbar{height:3px}
.matchup-overlay::-webkit-scrollbar-thumb{background:rgba(109,40,217,0.2);border-radius:2px}
.mn-card{flex-shrink:0;width:260px;padding:10px 12px;background:rgba(255,255,255,0.55);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-radius:12px;border:1px solid rgba(255,255,255,0.75);box-shadow:0 4px 14px rgba(109,40,217,0.07)}
.mn-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:1.5px;opacity:.5}
.mn-card.high{border-left:3px solid #DC2626}
.mn-card.med{border-left:3px solid #B45309}
.mn-lvl{font-family:Orbitron;font-size:7px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:4px}
.mn-lvl.high{background:rgba(220,38,38,0.1);color:#DC2626}
.mn-lvl.med{background:rgba(180,83,9,0.1);color:#B45309}
.mn-balls{font-family:Rajdhani;font-size:8px;color:rgba(26,10,58,0.35);margin-left:6px}
.mn-txt{font-family:'Exo 2';font-size:9px;color:rgba(26,10,58,0.55);line-height:1.4;margin-top:3px}

/* ── FIFA-style player cards ── */
.pl{
  position:absolute;
  z-index:18;
  pointer-events:none;
  transition:opacity .3s;
  width:62px;
}
/* Outer card — vertical rectangle, gold border, DARK glass for contrast on green ground */
.pl-card{
  width:62px;
  border-radius:9px;
  overflow:hidden;
  border:1.5px solid rgba(255,215,0,0.55);
  background:rgba(8,1,20,0.62);
  backdrop-filter:blur(8px);
  box-shadow:0 6px 20px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,215,0,0.12);
  position:relative;
}
/* Top sheen */
.pl-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:1.5px;
  background:linear-gradient(90deg,transparent,#FFD700,transparent);
  opacity:.7;z-index:3;
}
.pl-num{
  position:absolute;top:4px;left:5px;
  font-family:Orbitron;font-size:7px;font-weight:900;
  color:rgba(255,215,0,0.9);
  background:rgba(8,1,20,0.65);backdrop-filter:blur(4px);
  padding:1px 4px;border-radius:3px;z-index:4;letter-spacing:.5px;
}
.pl-surname{
  font-family:Orbitron;font-size:7px;font-weight:800;
  color:#FFD700;letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:block;margin-top:1px;
}
/* Photo area — 3:4 ratio */
.pl-photo{
  width:100%;
  aspect-ratio:3/4;
  display:block;
  object-fit:cover;
  object-position:top center;
  position:relative;
  z-index:1;
}
/* Gradient overlay fading into card bottom */
.pl-gradient{
  position:absolute;
  bottom:0;left:0;right:0;
  height:60%;
  background:linear-gradient(to top,
    rgba(8,1,20,0.98) 0%,
    rgba(8,1,20,0.7)  45%,
    transparent       100%);
  z-index:2;
}
/* Number badge — top-left */
.pl-num{
  position:absolute;
  top:4px;left:5px;
  font-family:Orbitron;
  font-size:7px;font-weight:900;
  color:rgba(255,215,0,0.8);
  background:rgba(8,1,20,0.65);
  backdrop-filter:blur(4px);
  padding:1px 4px;
  border-radius:3px;
  z-index:4;
  letter-spacing:.5px;
}
/* Role badge — top-right */
.pl-role{
  position:absolute;
  top:4px;right:5px;
  font-family:Orbitron;
  font-size:5.5px;font-weight:800;
  letter-spacing:.8px;
  padding:2px 4px;
  border-radius:3px;
  z-index:4;
}
.pl-role.bat {background:rgba(0,229,255,0.18);color:#00E5FF;border:1px solid rgba(0,229,255,0.3)}
.pl-role.bowl{background:rgba(244,67,54,0.18);color:#F44336;border:1px solid rgba(244,67,54,0.3)}
.pl-role.all {background:rgba(255,193,7,0.18);color:#FFC107;border:1px solid rgba(255,193,7,0.3)}
.pl-role.wk  {background:rgba(139,92,246,0.18);color:#8B5CF6;border:1px solid rgba(139,92,246,0.3)}
/* Bottom text area */
.pl-info{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:0 5px 5px;
  z-index:4;
  text-align:center;
}
.pl-name{
  font-family:Rajdhani;
  font-size:9px;font-weight:700;
  color:#1a0a3a;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.1;
  display:block;
}
.pl-surname{
  font-family:Orbitron;
  font-size:7px;font-weight:800;
  color:#FFD700;
  letter-spacing:.5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  display:block;
  margin-top:1px;
}
/* Danger badge for opposition batting */
.pl-danger{
  font-family:Orbitron;font-size:5.5px;font-weight:700;
  letter-spacing:.8px;padding:1px 4px;border-radius:3px;
  display:inline-block;margin-top:2px;
}
.pl-danger.high{background:rgba(244,67,54,0.2);color:#F44336}
.pl-danger.med {background:rgba(255,193,7,0.2);color:#FFC107}
.pl-danger.low {background:rgba(76,175,80,0.2);color:#4CAF50}
/* Placeholder when no photo */
.pl-placeholder{
  width:100%;aspect-ratio:3/4;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;
  background:linear-gradient(160deg,rgba(35,7,79,0.8),rgba(8,1,20,0.9));
}
.pl-placeholder-init{
  font-family:Orbitron;font-size:14px;font-weight:900;
  color:rgba(255,215,0,0.5);
}
.db.high{background:rgba(244,67,54,0.2);color:#F44336}
.db.med{background:rgba(255,193,7,0.2);color:#FFC107}

// Pitch heatmap data per venue+opposition (simulated — last 10 matches wicket zones)
// Each zone: {zone, count, severity} — zones: fullToss, yorker, goodLen, shortOfGood, short, wide
function getPitchData(venue,opp){
  // Seed based on venue+opp string for consistent data
  const seed=(venue+opp).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng=(n)=>((seed*9301+49297*n)%233280)/233280;
  return {
    fullToss: Math.round(rng(1)*8+1),
    yorker:   Math.round(rng(2)*12+3),
    goodLen:  Math.round(rng(3)*22+8),  // typically highest — good length most dangerous
    shortOfGood: Math.round(rng(4)*18+5),
    short:    Math.round(rng(5)*10+1),
    wideOut:  Math.round(rng(6)*14+2),
    wideIn:   Math.round(rng(7)*10+1),
  };
}

// ─── Pitch Heatmap — global canvas init (avoids template literal nesting) ───
function phmInitCanvas(uid, zonesJSON, maxC, dotsJSON) {
  var zones = JSON.parse(zonesJSON);
  var dots  = JSON.parse(dotsJSON);
  var canvas = document.getElementById(uid);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  // Sandy pitch base
  var base = ctx.createLinearGradient(0,0,0,H);
  base.addColorStop(0,'#B8934A'); base.addColorStop(0.5,'#D4B882'); base.addColorStop(1,'#B8934A');
  ctx.fillStyle = base;
  ctx.beginPath();
  if(ctx.roundRect){ ctx.roundRect(0,0,W,H,10); } else { ctx.rect(0,0,W,H); }
  ctx.fill();
  ctx.save(); ctx.beginPath();
  if(ctx.roundRect){ ctx.roundRect(0,0,W,H,10); } else { ctx.rect(0,0,W,H); }
  ctx.clip();

  // Build a full-height continuous heatmap using a single linear gradient
  // Sample color at each y pixel by interpolating across all zones
  function getColorAt(yFrac){
    // Find which zone and interpolate
    for(var i=0;i<zones.length;i++){
      var z=zones[i];
      if(yFrac>=z.y0 && yFrac<=z.y1){
        var iv=z.count/maxC;
        // Lerp toward neighbouring zone for smooth blending
        var localT=(yFrac-z.y0)/(z.y1-z.y0); // 0..1 within this zone
        var ivNext=(i<zones.length-1)?zones[i+1].count/maxC:iv;
        var ivBlend=iv+(ivNext-iv)*Math.pow(localT,1.5);
        return ivBlend;
      }
    }
    return 0;
  }

  // Draw a full-height gradient using many thin horizontal strips (smooth)
  var STEPS=H;
  for(var py=0;py<STEPS;py++){
    var yFrac=py/STEPS;
    var iv=getColorAt(yFrac);
    // Color: low=gold/green, mid=orange, high=red
    var r,g,b;
    if(iv<0.25){ r=200; g=150+iv*200; b=0; }
    else if(iv<0.5){ var t=(iv-0.25)/0.25; r=200+t*55; g=Math.round(200-t*100); b=0; }
    else if(iv<0.75){ var t=(iv-0.5)/0.25; r=255; g=Math.round(100-t*100); b=0; }
    else { var t=(iv-0.75)/0.25; r=255; g=0; b=Math.round(t*30); }
    var alpha=(0.18+iv*0.70).toFixed(2);
    ctx.fillStyle='rgba('+r+','+g+','+b+','+alpha+')';
    ctx.fillRect(0,py,W,1);
  }

  // Radial hot-spot overlays centered in each zone for depth
  zones.forEach(function(z){
    var y0=z.y0*H, y1=z.y1*H, yMid=(y0+y1)/2;
    var iv=z.count/maxC;
    if(iv<0.2) return;
    var grd=ctx.createRadialGradient(W/2,yMid,0, W/2,yMid,W*0.55);
    var alpha=(iv*0.38).toFixed(2);
    grd.addColorStop(0,'rgba(255,'+(Math.round(80-iv*80))+',0,'+alpha+')');
    grd.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=grd; ctx.fillRect(0,y0,W,y1-y0);
  });

  // Dots removed — clean heatmap only

  // Crease lines
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.5;
  [[W*0.12,0.135*H,W*0.88,0.135*H],[W*0.12,0.865*H,W*0.88,0.865*H]].forEach(function(l){
    ctx.beginPath(); ctx.moveTo(l[0],l[1]); ctx.lineTo(l[2],l[3]); ctx.stroke();
  });
  // Stumps
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.8;
  [-6,0,6].forEach(function(ox){
    [[W/2+ox,0.105*H,W/2+ox,0.148*H],[W/2+ox,0.852*H,W/2+ox,0.895*H]].forEach(function(l){
      ctx.beginPath(); ctx.moveTo(l[0],l[1]); ctx.lineTo(l[2],l[3]); ctx.stroke();
    });
  });
  ctx.restore();
  ctx.strokeStyle='rgba(255,215,0,0.35)'; ctx.lineWidth=1;
  ctx.strokeRect(0.5,0.5,W-1,H-1);
  ctx.font='bold 7px Orbitron,Arial'; ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText('LEG',3,10); ctx.fillText('OFF',W-22,10);

  // Hover tooltip
  var tip    = document.getElementById(uid+'_tip');
  var tipZ   = document.getElementById(uid+'_zone');
  var tipW   = document.getElementById(uid+'_wkts');
  var tipD   = document.getElementById(uid+'_desc');
  canvas.addEventListener('mousemove', function(e){
    var rect=canvas.getBoundingClientRect();
    var yFrac=((e.clientY-rect.top)*(H/rect.height))/H;
    var z=null;
    for(var i=0;i<zones.length;i++){ if(yFrac>=zones[i].y0&&yFrac<=zones[i].y1){z=zones[i];break;} }
    if(z){
      tipZ.textContent=z.label;
      tipW.textContent=z.count+' WICKETS';
      tipD.textContent=z.desc;
      var iv=z.count/maxC;
      tipW.style.color=iv>0.75?'#F44336':iv>0.5?'#FF5722':iv>0.3?'#FFC107':'#4CAF50';
      tip.style.display='block';
      tip.style.top=Math.min(e.clientY-rect.top-20,180)+'px';
    } else { tip.style.display='none'; }
  });
  canvas.addEventListener('mouseleave', function(){ tip.style.display='none'; });
}

function buildPitchHeatmapHTML(venue, opp){
  var data    = getPitchData(venue||curVenue, opp||curOppTeam);
  var zones   = [
    {label:'FULL TOSS', desc:'Delivery reaching batter above waist height',            key:'fullToss',    y0:0.00,y1:0.12},
    {label:'YORKER',    desc:'Full delivery aimed at the batters feet or crease',      key:'yorker',      y0:0.12,y1:0.26},
    {label:'GOOD LEN',  desc:'Optimal length — highest wicket-taking zone',            key:'goodLen',     y0:0.26,y1:0.58},
    {label:'SHORT/GD',  desc:'Back of length — forces awkward back-foot play',         key:'shortOfGood', y0:0.58,y1:0.78},
    {label:'SHORT',     desc:'Bouncer territory — aimed at chest or head height',      key:'short',       y0:0.78,y1:1.00},
  ];
  var maxCount = Math.max.apply(null, zones.map(function(z){return data[z.key];}));
  maxCount = maxCount||1;
  var uid = 'phm_'+Date.now();

  // Pre-generate dot positions
  var dotPositions = zones.map(function(z,zi){
    var dots=[], cnt=Math.min(data[z.key],15);
    for(var i=0;i<cnt;i++){
      var seed=(zi*100+i)*137.508;
      dots.push({rx:0.18+((seed*73)%1)*0.64, ry:z.y0+0.08+((seed*41)%1)*(z.y1-z.y0-0.12)});
    }
    return dots;
  });

  var barsHTML = '';

  var zonesData = encodeURIComponent(JSON.stringify(zones.map(function(z){return {label:z.label,desc:z.desc,y0:z.y0,y1:z.y1,count:data[z.key]};})));
  var dotsData    = encodeURIComponent(JSON.stringify(dotPositions));

  var html = '<div style="margin-bottom:4px">'
    +'<div style="font-family:Rajdhani;font-size:7px;color:rgba(26,10,58,0.38);letter-spacing:1px;margin-bottom:6px">WICKET HEATMAP &middot; LAST 10 MATCHES &middot; '+((venue||curVenue).split(',')[0].toUpperCase())+'</div>'
    +'<div>'
    +'<div style="position:relative;width:100%">'
    +'<canvas id="'+uid+'" width="220" height="380" data-zones="'+zonesData+'" data-dots="'+dotsData+'" data-max="'+maxCount+'" style="border-radius:8px;cursor:crosshair;display:block;width:100%;height:380px;margin-bottom:8px"></canvas>'
    +'<div id="'+uid+'_tip" style="display:none;position:absolute;left:8px;top:8px;background:rgba(8,1,20,0.88);border:1px solid rgba(255,215,0,0.5);border-radius:8px;padding:8px 12px;min-width:150px;z-index:99;backdrop-filter:blur(12px);pointer-events:none">'
    +'<div id="'+uid+'_zone" style="font-family:Orbitron;font-size:9px;font-weight:700;color:#FFD700;margin-bottom:4px"></div>'
    +'<div id="'+uid+'_wkts" style="font-family:Rajdhani;font-size:13px;font-weight:700;color:#FF6B6B;margin-bottom:3px"></div>'
    +'<div id="'+uid+'_desc" style="font-family:sans-serif;font-size:8px;color:rgba(255,255,255,0.6);line-height:1.4"></div>'
    +'</div></div>'
    
    +'</div>'

    // Init via requestAnimationFrame so canvas is in DOM

    +'</div>';
  setTimeout(function(){
    var c = document.getElementById(uid);
    if(c) phmInitCanvas(uid, decodeURIComponent(c.dataset.zones), maxCount, decodeURIComponent(c.dataset.dots));
  }, 50);
  return html;
}

function switchTab(idx){
  curTab=idx;renderTabs();

  document.getElementById('layout-full').classList.toggle('hidden',is3);

  else renderScenarios();

// ═══ 120-BALL BOUNDARY PROBABILITY RING ═══
// Boundary probability per ball (0–1). Models T20 cricket patterns:
// PP overs 1-6 (balls 1-36): high aggression, esp. ball 1-6 (first over)
// Middle overs 7-15 (balls 37-90): consolidation with selective hitting
// Death overs 16-20 (balls 91-120): escalating aggression peaks
function genBallProbs(){
  const probs=[];
  for(let b=0;b<120;b++){
    const ov=Math.floor(b/6); // 0-based over index
    let base,noise;
    if(ov<6){ // Powerplay
      // First over: new ball, field restrictions — high boundary chance
      if(ov===0) base=0.45+Math.sin(b*0.9)*0.12;
      else if(ov<3) base=0.35+Math.sin(b*0.7+1)*0.1;
      else base=0.28+Math.sin(b*0.6)*0.09; // overs 4-6: settle in
      noise=0.06;
    } else if(ov<10){ // Mid overs early: conservation
      base=0.18+Math.sin(b*0.4+2)*0.07;
      noise=0.05;
    } else if(ov<14){ // Mid overs late: rebuild acceleration
      const prog=(ov-10)/4;
      base=0.20+prog*0.14+Math.sin(b*0.5)*0.06;
      noise=0.06;
    } else if(ov===14||ov===15){ // Pre-death ramp
      base=0.38+Math.sin(b*0.8)*0.08;
      noise=0.07;
    } else { // Death overs 16-20: maximum aggression
      const prog=(ov-15)/5;
      base=0.52+prog*0.28+Math.sin(b*1.2)*0.1;
      // Last 2 overs go maximum
      if(ov>=18) base=Math.min(0.92,base+0.12);
      noise=0.08;
    }
    probs.push(Math.max(0.05,Math.min(0.97,base+(Math.random()*2-1)*noise)));
  }
  return probs;
}
const ballProbs=genBallProbs();

function drawBallRing(){
  const canvas=document.getElementById('ball-ring-canvas');
  if(!canvas)return;
  const W=canvas.offsetWidth||canvas.parentElement.clientWidth;
  const H=canvas.offsetHeight||canvas.parentElement.clientHeight;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  
  const cx=W/2, cy=H*0.52; // center slightly below midpoint (matches 3D field center)
  // Ring radius: fits nicely over the 3D boundary ring
  const ringR=Math.min(W,H)*0.30;
  const barMaxH=Math.min(W,H)*0.055; // max bar length (outward from ring)
  const barW=Math.max(2, (2*Math.PI*ringR/120)*0.72); // ~72% fill
  
  // Draw faint ring guide
  ctx.beginPath();ctx.arc(cx,cy,ringR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.stroke();
  
  // Phase arc backgrounds
  const phases=[
    {start:0,end:36,color:'rgba(0,229,255,0.04)'},   // PP
    {start:36,end:90,color:'rgba(255,215,0,0.03)'},   // Mid
    {start:90,end:120,color:'rgba(244,67,54,0.05)'}   // Death
  ];
  phases.forEach(ph=>{
    const a0=(ph.start/120)*Math.PI*2-Math.PI/2;
    const a1=(ph.end/120)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.arc(cx,cy,ringR+barMaxH+4,a0,a1);
    ctx.arc(cx,cy,ringR-4,a1,a0,true);
    ctx.closePath();ctx.fillStyle=ph.color;ctx.fill();
  });

  // Phase separator lines
  [0,36,90].forEach(b=>{
    const a=(b/120)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(ringR-8),cy+Math.sin(a)*(ringR-8));
    ctx.lineTo(cx+Math.cos(a)*(ringR+barMaxH+10),cy+Math.sin(a)*(ringR+barMaxH+10));
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=0.8;ctx.stroke();
  });

  // Phase labels
  const phaseLabels=[
    {ball:18,label:'POWERPLAY',color:'rgba(0,229,255,0.6)'},
    {ball:63,label:'MIDDLE',color:'rgba(255,215,0,0.5)'},
    {ball:105,label:'DEATH',color:'rgba(244,67,54,0.65)'}
  ];
  phaseLabels.forEach(pl=>{
    const a=(pl.ball/120)*Math.PI*2-Math.PI/2;
    const lr=ringR+barMaxH+18;
    ctx.save();ctx.translate(cx+Math.cos(a)*lr,cy+Math.sin(a)*lr);ctx.rotate(a+Math.PI/2);
    ctx.font='500 8px Rajdhani, sans-serif';ctx.letterSpacing='2px';
    ctx.fillStyle=pl.color;ctx.textAlign='center';ctx.fillText(pl.label,0,0);ctx.restore();
  });

  // Over tick marks
  for(let ov=0;ov<20;ov++){
    const a=(ov*6/120)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(ringR-6),cy+Math.sin(a)*(ringR-6));
    ctx.lineTo(cx+Math.cos(a)*(ringR+2),cy+Math.sin(a)*(ringR+2));
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=ov%5===0?1.2:0.6;ctx.stroke();
    // Over number every 5
    if(ov%5===0&&ov>0){
      const nr=ringR-14;
      ctx.font='bold 7px Orbitron, sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.18)';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ov,cx+Math.cos(a)*nr,cy+Math.sin(a)*nr);
    }
  }

  // Draw 120 bars
  ballProbs.forEach((p,b)=>{
    const a=(b/120)*Math.PI*2-Math.PI/2;
    const h=p*barMaxH;
    const r0=ringR, r1=ringR+h;
    const hw=barW/2;
    // Perpendicular angle for bar width
    const pa=a+Math.PI/2;
    const x0=cx+Math.cos(a)*r0, y0=cy+Math.sin(a)*r0;
    const x1=cx+Math.cos(a)*r1, y1=cy+Math.sin(a)*r1;
    // Bar color by probability
    let col;
    if(p<0.25) col='rgba(76,175,80,0.85)';
    else if(p<0.50) col=`rgba(255,215,0,0.88)`;
    else if(p<0.75) col=`rgba(255,140,0,0.88)`;
    else col=`rgba(244,67,54,0.90)`;
    
    ctx.beginPath();
    ctx.moveTo(x0+Math.cos(pa)*hw, y0+Math.sin(pa)*hw);
    ctx.lineTo(x0-Math.cos(pa)*hw, y0-Math.sin(pa)*hw);
    ctx.lineTo(x1-Math.cos(pa)*hw, y1-Math.sin(pa)*hw);
    ctx.lineTo(x1+Math.cos(pa)*hw, y1+Math.sin(pa)*hw);
    ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    
    // Glow tip for high probability balls
    if(p>0.65){
      ctx.beginPath();ctx.arc(x1,y1,barW*0.7,0,Math.PI*2);
      ctx.fillStyle=p>0.80?'rgba(244,67,54,0.5)':'rgba(255,140,0,0.35)';ctx.fill();
    }
  });
  
  // Center label
  ctx.font='bold 9px Orbitron, sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('120 BALLS',cx,cy-6);
  ctx.font='500 7px Rajdhani, sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillText('BOUNDARY RISK',cx,cy+6);
}

const pitchM = (()=>{
  const pw=128, ph=512; // canvas: narrow width, tall height (pitch is 2×6.5 ratio)
  const pc=document.createElement('canvas');
  pc.width=pw; pc.height=ph;
  const px2=pc.getContext('2d');

  // Get current pitch data
  const d=getPitchData(curVenue, curOppTeam);
  const maxVal=Math.max(d.fullToss,d.yorker,d.goodLen,d.shortOfGood,d.short,1);

  // Zones top→bottom (batting end at top):
  // fullToss (0-8%), yorker (8-20%), goodLen (20-50%), shortOfGood (50-75%), short (75-100%)
  const zones=[
    {key:'fullToss',  y0:0.00, y1:0.08},
    {key:'yorker',    y0:0.08, y1:0.20},
    {key:'goodLen',   y0:0.20, y1:0.50},
    {key:'shortOfGood',y0:0.50,y1:0.75},
    {key:'short',     y0:0.75, y1:1.00},
  ];

  // Color scale: low=sandy, mid=orange, high=red
  function heatColor(intensity){
    if(intensity<0.3) return `rgba(${Math.round(197+30*intensity)},${Math.round(168-80*intensity)},${Math.round(125-90*intensity)},1)`;
    if(intensity<0.6) return `rgba(${Math.round(255)},${Math.round(140-100*(intensity-0.3)/0.3)},${Math.round(30-30*(intensity-0.3)/0.3)},1)`;
    return `rgba(${Math.round(255)},${Math.round(40-40*(intensity-0.6)/0.4)},${Math.round(0)},1)`;
  }

  // Sandy base
  px2.fillStyle='#C5A87D'; px2.fillRect(0,0,pw,ph);

  // Draw each zone
  zones.forEach(z=>{
    const intensity=d[z.key]/maxVal;
    const y0=Math.round(z.y0*ph), y1=Math.round(z.y1*ph);
    const h2=y1-y0;
    // Zone gradient — center brighter
    const grad=px2.createLinearGradient(0,y0,0,y1);
    const col=heatColor(intensity);
    grad.addColorStop(0,  col.replace(',1)',',0.3)'));
    grad.addColorStop(0.5,col.replace(',1)',`,${0.3+intensity*0.65})`));
    grad.addColorStop(1,  col.replace(',1)',',0.3)'));

    // Horizontal zone separator line
    px2.strokeStyle='rgba(255,255,255,0.25)';
    px2.lineWidth=1;
    px2.beginPath(); px2.moveTo(0,y1); px2.lineTo(pw,y1); px2.stroke();

    // Intensity dots cluster
    const dotCount=Math.round(intensity*8);
    for(let k=0;k<dotCount;k++){
      const dx=pw*0.2+Math.random()*pw*0.6;
      const dy=y0+h2*0.15+Math.random()*h2*0.7;
      const alpha=0.4+intensity*0.5;
      px2.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
      px2.beginPath(); px2.arc(dx,dy,2+intensity*2.5,0,Math.PI*2); px2.fill();
    }
  });

  // Crease lines
  px2.strokeStyle='rgba(255,255,255,0.85)'; px2.lineWidth=3;
  [0.135, 0.865].forEach(yf=>{
    const y=yf*ph;
    px2.beginPath(); px2.moveTo(8,y); px2.lineTo(pw-8,y); px2.stroke();
  });
  // Popping crease (inner)
  px2.lineWidth=1.5;
  [0.16, 0.84].forEach(yf=>{
    const y=yf*ph;
    px2.beginPath(); px2.moveTo(8,y); px2.lineTo(pw-8,y); px2.stroke();
  });
  // Centre line
  px2.strokeStyle='rgba(255,255,255,0.20)'; px2.lineWidth=1;
  px2.beginPath(); px2.moveTo(pw/2,0); px2.lineTo(pw/2,ph); px2.stroke();
  // Stump holes
  [-0.22,0,0.22].forEach(ox=>{
    [0.145,0.855].forEach(yf=>{
      px2.fillStyle='rgba(80,40,0,0.7)';
      px2.beginPath(); px2.arc(pw/2+ox*pw,yf*ph,3,0,Math.PI*2); px2.fill();
    });
  });

  const pitchTex=new THREE.CanvasTexture(pc);
  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(2,0.06,6.5),
    new THREE.MeshPhongMaterial({map:pitchTex, shininess:8})
  );
  mesh.position.y=0.56;
  scene.add(mesh);
  return mesh;
})();

(()=>{
  // Build LED panel texture — dark housing with bright white LEDs in grid

  for(let r=0;r<=rows;r++){ pc.beginPath(); pc.moveTo(0,r*cellH); pc.lineTo(512,r*cellH); pc.stroke(); }
  for(let c=0;c<=cols;c++){ pc.beginPath(); pc.moveTo(c*cellW,0); pc.lineTo(c*cellW,256); pc.stroke(); }

  // LEDs — centered in each cell
  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      const lx = c*cellW + cellW/2;
      const ly = r*cellH + cellH/2;
      const radius = Math.min(cellW,cellH)*0.34;

      // Big outer glow
      const grd = pc.createRadialGradient(lx,ly,0,lx,ly,radius*2.2);
      grd.addColorStop(0,'rgba(200,230,255,0.5)');
      grd.addColorStop(1,'rgba(200,230,255,0)');
      pc.fillStyle=grd; pc.beginPath(); pc.arc(lx,ly,radius*2.2,0,Math.PI*2); pc.fill();

      // LED body
      const led = pc.createRadialGradient(lx-radius*0.25,ly-radius*0.25,0,lx,ly,radius);
      led.addColorStop(0,'#FFFFFF');
      led.addColorStop(0.4,'#E8F4FF');
      led.addColorStop(0.8,'#B0C8E8');
      led.addColorStop(1,'#6080A0');
      pc.fillStyle=led; pc.beginPath(); pc.arc(lx,ly,radius,0,Math.PI*2); pc.fill();

      // Specular highlight
      pc.fillStyle='rgba(255,255,255,0.9)';

const barG=new THREE.Group();barG.visible=false;scene.add(barG);
const bars=[];
const BAR_RADIUS=23.5; // sit just outside new boundary rope (r=22)
const BAR_MAX_H=7;   // max 3D height units
for(let b=0;b<120;b++){
  const a=(b/120)*Math.PI*2;
  const prob=ballProbs[b];
  const h=0.3+prob*BAR_MAX_H;
  // Color matches canvas ring: green/gold/orange/red
  let col;
  if(prob<0.25)      col=0x4CAF50;
  else if(prob<0.50) col=0xFFD700;
  else if(prob<0.75) col=0xFF8C00;
  else               col=0xF44336;
  const bx=Math.cos(a)*BAR_RADIUS, bz=Math.sin(a)*BAR_RADIUS;
  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(0.55,h,0.55),
    new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.35,transparent:true,opacity:0.88})
  );
  mesh.position.set(bx,0.15+h/2,bz);
  barG.add(mesh);
  bars.push({mesh,baseH:h,prob,angle:a,ball:b});
}

// Bowling zones
const bzG=new THREE.Group();bzG.visible=false;scene.add(bzG);
[{z:-2,c:0x8B5CF6,o:.12},{z:.5,c:0xFF8C00,o:.1},{z:2.8,c:0xF44336,o:.15}].forEach(d=>{
  const p=new THREE.Mesh(new THREE.PlaneGeometry(1.8,2),new THREE.MeshBasicMaterial({color:d.c,transparent:true,opacity:d.o,side:THREE.DoubleSide}));
  p.rotation.x=-Math.PI/2;p.position.set(0,0.22,d.z);bzG.add(p);
});
// Bowl cluster dots
[{x:-0.3,z:-1.8,c:0x8B5CF6},{x:0.2,z:-1.2,c:0x8B5CF6},{x:0.5,z:0.3,c:0xFF8C00},{x:-0.3,z:0.8,c:0xFF8C00},{x:0.1,z:2.5,c:0xF44336},{x:-0.4,z:2.8,c:0xF44336},{x:0.3,z:-0.5,c:0x8B5CF6},{x:-0.5,z:1.5,c:0xFF8C00}].forEach(d=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),new THREE.MeshBasicMaterial({color:d.c}));
  m.position.set(d.x,0.35,d.z);bzG.add(m);
});

function updateScene(){
  barG.visible=curTab===1;
  bzG.visible=curTab===1;
  const ps=curTab===1?2.5:1;
  pitchM.scale.set(ps,1,ps);
}
function updateBars(){
  // Pulse bars based on selected over — highlight that over's 6 balls brighter
  bars.forEach(b=>{
    const ballOver=Math.floor(b.ball/6)+1;
    const boost=(ballOver===curOver)?0.4:0;
    b.mesh.scale.y=1+boost;
    b.mesh.material.emissiveIntensity=0.35+boost;
  });
}
// Camera locked at reference screenshot angle — further back to show full stadium
// 3D perspective: Y=42, orbit=52 | Top Down: Y=60, orbit=1
const DEF_Y=58, DEF_ORBIT=85;
let targetY=DEF_Y, targetZ=DEF_ORBIT, orbitRadius=DEF_ORBIT;
let baseY=DEF_Y, baseZ=DEF_ORBIT, zoomLevel=1;

function setView(v,el){
  document.querySelectorAll('.vb').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
  if(v==='top'){targetY=40;orbitRadius=1;}
  else{targetY=DEF_Y;orbitRadius=DEF_ORBIT;}
}
function applyZoom(){} // scroll zoom disabled
function zoomStep(){}
function zoomReset(){}

// Wheel scroll disabled — fixed camera angle on all tabs
container.addEventListener('wheel',function(e){e.preventDefault();},{passive:false});

function updatePL(){
  if(curTab>2)return;
  const rect=container.getBoundingClientRect();
  const ps=curTab===2?oppBat:xiOpts[curXI].players;
  ps.forEach((p,i)=>{
    if(i>=playerPos.length)return;
    const pos=playerPos[i];
    const v=new THREE.Vector3(pos.x,1.5,pos.z);v.project(camera);
    const x=(v.x*.5+.5)*rect.width,y=(-v.y*.5+.5)*rect.height;
    const el=document.getElementById(`pl-${i}`);
    // Centre horizontally on card (62px wide), anchor bottom at player feet
    if(el){el.style.left=(x-31)+'px';el.style.top=(y-92)+'px';el.style.opacity=v.z<1?1:0;}
  });
}

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;
  // Smooth camera to target
  camera.position.y+=(targetY-camera.position.y)*0.03;
  camera.position.z+=(targetZ-camera.position.z)*0.03;
  // Auto-rotate on ALL tabs — gentle circular orbit
  camera.position.x=Math.sin(t*0.06)*orbitRadius;
  camera.position.z=Math.cos(t*0.06)*orbitRadius;
  camera.lookAt(0,0,0);
  // gR removed
  // Wind dots flow
  windDots.forEach(d=>{
    const travel=((t*d.speed+d.phase)%d.drift)/d.drift;
    d.mesh.position.x=d.baseX+travel*d.drift*windDir.x;
    d.mesh.position.z=d.baseZ+travel*d.drift*windDir.z;
    d.mesh.position.y=d.baseY+Math.sin(t*0.8+d.phase)*0.3;
    const fade=travel<0.1?travel/0.1:travel>0.85?(1-travel)/0.15:1;
    d.mesh.material.opacity=(0.06+Math.sin(t*2+d.phase)*0.04)*fade;
  });
  // Wind stream lines gentle sway
  windStreams.forEach(s=>{
    s.line.position.y=Math.sin(t*0.4+s.phase)*0.3;
    s.cone.position.y=s.pts[s.pts.length-1].y+Math.sin(t*0.4+s.phase)*0.3;
  });
  // Gentle breathing pulse on 120 bars (bowling tab only)
  if(curTab===1){
    bars.forEach(b=>{
      const ballOver=Math.floor(b.ball/6)+1;
      const isSelected=(ballOver===curOver);
      const breath=isSelected
        ? 1+Math.sin(t*2.5+b.angle)*0.25
        : 1+Math.sin(t*1.2+b.angle*2)*0.06;
      b.mesh.scale.y=breath;
    });
  }
  renderer.render(scene,camera);
  updatePL();
  if(window._bannerUpdate) window._bannerUpdate();
}

renderTabs();switchTab(0);animate();
